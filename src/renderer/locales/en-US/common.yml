  buildChannel:
    development: Development
    production: Production
  foundationModules:
    - React 19 renderer entry with strict TypeScript setup
    - Redux Toolkit store with typed hooks and async preload bridge state
    - shadcn-compatible component registry and Tailwind foundation
    - Renderer aliasing with @/ imports for scalable module growth
  roadmap:
    overview:
      - title: Foundation ready
        detail: Dependencies, folder layout, and state management have moved beyond a single page demo and into an extensible app shell.
      - title: Electron bridge online
        detail: App info from the main process is now fetched through a Redux thunk.
      - title: UI system ready
        detail: New pages can build directly on top of shadcn-style components and shared design tokens.
    repos:
      - title: Hub dashboard
        detail: Instance lists, resource monitoring, task panels, and inbox modules can land here next.
      - title: Feature modules
        detail: A dedicated features directory is the next clean split for slices, components, and IPC contracts.
      - title: Navigation growth
        detail: The current section state already leaves room for tabs or router-based navigation later.
    actions:
      - title: Managed workflow board
        detail: Curated workflows can stay pinned here so routine release and maintenance flows stay one click away.
      - title: Dispatch safety
        detail: Workflow inputs and manual runs should keep tokens in the main process and show clear errors.
      - title: Future expansion
        detail: This surface can grow into runners, logs, and queue inspection without changing the top-level shell.
    settings:
      - title: Environment controls
        detail: Log levels, update channels, experimental flags, and diagnostics can be added here later.
      - title: State persistence
        detail: If local configuration persistence is needed, it can be added in middleware or through preload IPC.
      - title: Design system scale
        detail: Future forms, dialogs, and tables should continue extending the same shadcn component directory.
  nextSteps:
    - Split future components, slices, and IPC actions under src/renderer/features by domain.
    - Keep extending components.json when more shadcn components are needed.
    - Switch from section state to React Router once the app grows beyond a single shell view.
  statusBar:
    section: Section
    account: Account
    repos: Repos
    orgs: Orgs
    runtime: Runtime
    ready: Ready
    none: None
