name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
      - bugfix
  - title: Documentation
    labels:
      - docs
      - documentation
  - title: Maintenance
    labels:
      - chore
      - ci
      - dependencies

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch

template: |
  ## Changes

  $CHANGES
