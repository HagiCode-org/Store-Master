name: Reusable Unix Package Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_production_build:
        required: true
        type: boolean
      publish_release_assets:
        required: true
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  build-unix:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runs_on }}
    environment:
      name: ${{ inputs.is_production_build && 'production' || 'ci' }}
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-appimage
            name: Linux AppImage
            platform: linux
            runs_on: ubuntu-latest
            command: npm run build:linux:appimage
            artifact_path: pkg/*.AppImage
          - id: linux-deb
            name: Linux DEB
            platform: linux
            runs_on: ubuntu-latest
            command: npm run build:linux:deb
            artifact_path: pkg/*.deb
          - id: linux-rpm
            name: Linux RPM
            platform: linux
            runs_on: ubuntu-latest
            command: npm run build:linux:rpm
            artifact_path: pkg/*.rpm
          - id: linux-tar-gz
            name: Linux tar.gz
            platform: linux
            runs_on: ubuntu-latest
            command: npm run build:linux:tar.gz
            artifact_path: pkg/*.tar.gz
          - id: linux-zip
            name: Linux ZIP
            platform: linux
            runs_on: ubuntu-latest
            command: npm run build:linux:zip
            artifact_path: pkg/*.zip
          - id: mac-x64-dmg
            name: macOS x64 DMG
            platform: mac
            runs_on: macos-15-intel
            command: npm run build:mac:x64:dmg
            artifact_path: pkg/*.dmg
          - id: mac-x64-zip
            name: macOS x64 ZIP
            platform: mac
            runs_on: macos-15-intel
            command: npm run build:mac:x64:zip
            artifact_path: pkg/*.zip
          - id: mac-arm64-dmg
            name: macOS arm64 DMG
            platform: mac
            runs_on: macos-14
            command: npm run build:mac:arm64:dmg
            artifact_path: pkg/*.dmg
          - id: mac-arm64-zip
            name: macOS arm64 ZIP
            platform: mac
            runs_on: macos-14
            command: npm run build:mac:arm64:zip
            artifact_path: pkg/*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve macOS signing mode
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build
        id: mac_signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          if [[ -z "${CSC_LINK}" ]]; then
            missing+=('CSC_LINK')
          fi
          if [[ -z "${CSC_KEY_PASSWORD}" ]]; then
            missing+=('CSC_KEY_PASSWORD')
          fi

          has_api_key_auth=true
          for key in APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!key}" ]]; then
              has_api_key_auth=false
            fi
          done

          has_apple_id_auth=true
          for key in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!key}" ]]; then
              has_apple_id_auth=false
            fi
          done

          if [[ "${has_api_key_auth}" != 'true' && "${has_apple_id_auth}" != 'true' ]]; then
            missing+=('APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER or APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID')
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            printf '::warning::Missing macOS signing configuration: %s. Falling back to unsigned macOS build.\n' "$(IFS=', '; echo "${missing[*]}")"
            {
              echo '## macOS signing fallback'
              echo
              echo 'Production macOS signing configuration is incomplete. This job will publish unsigned macOS artifacts only.'
              echo
              echo 'Missing values:'
              for key in "${missing[@]}"; do
                echo "- ${key}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          target_version="${{ inputs.version }}"
          current_version="$(node -p "require('./package.json').version")"

          if [[ "$current_version" == "$target_version" ]]; then
            echo "package.json version already matches $target_version"
            exit 0
          fi

          npm version "$target_version" --no-git-tag-version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi

            echo "npm ci failed on attempt ${attempt}; cleaning workspace and retrying..."
            rm -rf node_modules
            npm cache verify || true
            sleep $((attempt * 10))
          done

      - name: Install Linux packaging dependencies
        if: success() && (matrix.target.id == 'linux-appimage' || matrix.target.id == 'linux-rpm')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          packages=(xz-utils)
          if [[ "${{ matrix.target.id }}" == 'linux-appimage' ]]; then
            packages+=(squashfs-tools)
          fi
          if [[ "${{ matrix.target.id }}" == 'linux-rpm' ]]; then
            packages+=(rpm)
          fi
          sudo apt-get install -y "${packages[@]}"

      - name: Build unsigned macOS packages
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build
        run: ${{ matrix.target.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WINAPP_CLI_TELEMETRY_OPTOUT: '1'

      - name: Preserve unsigned macOS artifacts
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build
        shell: bash
        run: |
          set -euo pipefail
          node scripts/preserve-artifacts.js \
            --source-dir pkg \
            --artifact-path "${{ matrix.target.artifact_path }}" \
            --output-dir unsigned-artifacts \
            --suffix unsigned

      - name: Reset macOS package output for signed artifacts
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build && steps.mac_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          rm -rf pkg
          mkdir -p pkg

      - name: Prepare macOS release signing environment
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build && steps.mac_signing.outputs.enabled == 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          work_dir="$RUNNER_TEMP/hagicode-macos-signing"
          cert_path="$work_dir/signing-cert.p12"
          keychain_path="$RUNNER_TEMP/hagicode-build.keychain-db"
          api_key_path="$work_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          keychain_password="$(openssl rand -hex 24)"

          rm -rf "$work_dir"
          mkdir -p "$work_dir"
          rm -f "$keychain_path"

          if [[ "${CSC_LINK}" =~ ^https?:// ]]; then
            curl -fsSL "${CSC_LINK}" -o "$cert_path"
          elif [[ "${CSC_LINK}" =~ ^file:// ]]; then
            cp "${CSC_LINK#file://}" "$cert_path"
          elif [[ -f "${CSC_LINK}" ]]; then
            cp "${CSC_LINK}" "$cert_path"
          else
            printf '%s' "${CSC_LINK}" | base64 --decode > "$cert_path"
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          existing_keychains="$(security list-keychains -d user | sed 's/^[[:space:]]*//; s/^\"//; s/\"$//')"
          if [[ -n "$existing_keychains" ]]; then
            security list-keychains -d user -s "$keychain_path" $existing_keychains
          else
            security list-keychains -d user -s "$keychain_path"
          fi
          security default-keychain -d user -s "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(.*\)"/\1/p' | head -n 1)"
          if [[ -z "$identity" ]]; then
            echo '::error::No macOS code signing identity was found after importing CSC_LINK.'
            exit 1
          fi

          if [[ -n "${APPLE_API_KEY}" && -n "${APPLE_API_KEY_ID}" && -n "${APPLE_API_ISSUER}" ]]; then
            printf '%s\n' "${APPLE_API_KEY}" > "$api_key_path"
            chmod 600 "$api_key_path"
            echo "APPLE_API_KEY_PATH=${api_key_path}" >> "$GITHUB_ENV"
            echo "HAGICODE_APPLE_API_KEY_PATH=${api_key_path}" >> "$GITHUB_ENV"
          fi

          {
            echo 'HAGICODE_ENABLE_MAC_SIGNING=true'
            echo "CSC_NAME=${identity}"
            echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}"
            echo "APPLE_ID=${APPLE_ID}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD}"
            echo "APPLE_TEAM_ID=${APPLE_TEAM_ID}"
            echo "HAGICODE_MACOS_KEYCHAIN_PATH=${keychain_path}"
            echo "HAGICODE_MACOS_SIGNING_TEMP_DIR=${work_dir}"
          } >> "$GITHUB_ENV"

      - name: Build packages
        if: success() && (matrix.target.platform != 'mac' || !inputs.is_production_build || steps.mac_signing.outputs.enabled == 'true')
        run: ${{ matrix.target.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.target.platform == 'mac' && steps.mac_signing.outputs.enabled == 'true' && 'true' || 'false' }}
          WINAPP_CLI_TELEMETRY_OPTOUT: '1'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.id }}
          path: ${{ matrix.target.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish build artifacts to existing GitHub Release
        if: success() && inputs.publish_release_assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(${{ matrix.target.artifact_path }})
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files matched: ${{ matrix.target.artifact_path }}" >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" --clobber "${files[@]}"

      - name: Upload unsigned macOS artifacts
        if: success() && matrix.target.platform == 'mac' && inputs.is_production_build
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.id }}-unsigned
          path: unsigned-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish unsigned macOS artifacts to existing GitHub Release
        if: success() && inputs.publish_release_assets && matrix.target.platform == 'mac' && inputs.is_production_build
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(unsigned-artifacts/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No unsigned macOS release files were found" >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" --clobber "${files[@]}"

      - name: Clean up macOS signing materials
        if: always() && matrix.target.platform == 'mac' && inputs.is_production_build && steps.mac_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${HAGICODE_MACOS_KEYCHAIN_PATH:-}" && -f "${HAGICODE_MACOS_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${HAGICODE_MACOS_KEYCHAIN_PATH}" || true
          fi
          if [[ -n "${HAGICODE_MACOS_SIGNING_TEMP_DIR:-}" && -d "${HAGICODE_MACOS_SIGNING_TEMP_DIR}" ]]; then
            rm -rf "${HAGICODE_MACOS_SIGNING_TEMP_DIR}"
          fi
