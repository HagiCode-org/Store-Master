name: Reusable Windows Package Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_production_build:
        required: true
        type: boolean
      sign_windows_release:
        required: true
        type: boolean
      publish_release_assets:
        required: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  build-windows:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runs_on }}
    environment:
      name: ${{ inputs.is_production_build && 'production' || 'ci' }}
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: win-portable
            name: Windows Portable
            runs_on: windows-2025-vs2026
            command: npm run build:win:portable
            artifact_path: pkg/*.exe
          - id: win-nsis
            name: Windows NSIS
            runs_on: windows-2025-vs2026
            command: npm run build:win:nsis
            artifact_path: pkg/*Setup*.exe
          - id: win-msix
            name: Windows MSIX
            runs_on: windows-2025-vs2026
            command: npm run build:win:msix
            artifact_path: pkg/*.msix

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine Windows signing policy
        id: signing_policy
        shell: bash
        run: |
          if [[ "${{ inputs.is_production_build }}" == 'true' ]]; then
            required=true
            reason='production build'
          elif [[ "${{ inputs.sign_windows_release }}" == 'true' ]]; then
            required=true
            reason='manual workflow_dispatch override'
          else
            required=false
            reason='non-release build'
          fi

          echo "required=${required}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Validate Windows Artifact Signing configuration
        if: success() && steps.signing_policy.outputs.required == 'true'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
        run: |
          missing=()
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CODESIGN_ENDPOINT AZURE_CODESIGN_ACCOUNT_NAME AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME WINDOWS_PACKAGE_PUBLISHER; do
            if [[ -z "${!key}" ]]; then
              missing+=("${key}")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf '::error::Missing Artifact Signing configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          target_version="${{ inputs.version }}"
          current_version="$(node -p "require('./package.json').version")"

          if [[ "$current_version" == "$target_version" ]]; then
            echo "package.json version already matches $target_version"
            exit 0
          fi

          npm version "$target_version" --no-git-tag-version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi

            echo "npm ci failed on attempt ${attempt}; cleaning workspace and retrying..."
            rm -rf node_modules
            npm cache verify || true
            sleep $((attempt * 10))
          done

      - name: Resolve Windows SDK for MSIX packaging
        if: success() && matrix.target.id == 'win-msix'
        id: windows_sdk
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $windowsKitsRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          if (-not (Test-Path $windowsKitsRoot)) {
            throw "Windows Kits bin directory not found: $windowsKitsRoot"
          }

          $sdkDirectory = Get-ChildItem -Path $windowsKitsRoot -Directory |
            Where-Object {
              $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and
              (Test-Path (Join-Path $_.FullName 'x64\makeappx.exe')) -and
              (Test-Path (Join-Path $_.FullName 'x64\makepri.exe'))
            } |
            Sort-Object { [version] $_.Name } -Descending |
            Select-Object -First 1

          if (-not $sdkDirectory) {
            throw "No Windows SDK with makeappx.exe and makepri.exe was found under $windowsKitsRoot"
          }

          "WINDOWS_KIT_VERSION=$($sdkDirectory.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$($sdkDirectory.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Resolved Windows SDK for MSIX: $($sdkDirectory.Name)"

      - name: Build packages
        run: ${{ matrix.target.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINAPP_CLI_TELEMETRY_OPTOUT: '1'
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}

      - name: Preserve unsigned Windows artifacts
        if: success() && steps.signing_policy.outputs.required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/preserve-artifacts.js \
            --source-dir pkg \
            --artifact-path "${{ matrix.target.artifact_path }}" \
            --output-dir unsigned-artifacts \
            --suffix unsigned

      - name: Collect Windows signable artifacts
        if: success() && steps.signing_policy.outputs.required == 'true'
        id: windows_artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (-not (Test-Path $pkgDir)) {
            throw "pkg directory not found: $pkgDir"
          }

          $allFiles = Get-ChildItem -Path $pkgDir -File
          $selectedFiles = switch ('${{ matrix.target.id }}') {
            'win-portable' { @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -notlike '*Setup*' } | Sort-Object FullName -Unique) }
            'win-nsis' { @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -like '*Setup*' } | Sort-Object FullName -Unique) }
            'win-msix' { @($allFiles | Where-Object { $_.Extension -ieq '.msix' } | Sort-Object FullName -Unique) }
            default { @() }
          }

          if ($selectedFiles.Count -eq 0) {
            throw "No signable Windows artifacts were found in pkg/ for ${{ matrix.target.id }}."
          }

          if ($selectedFiles.Count -gt 1) {
            $listedFiles = ($selectedFiles | ForEach-Object { $_.FullName }) -join "`n"
            throw "Expected exactly one signable Windows artifact for ${{ matrix.target.id }}, found $($selectedFiles.Count):`n$listedFiles"
          }

          $selectedFile = $selectedFiles[0]
          $catalogPath = Join-Path $pkgDir 'windows-signable-artifacts.txt'
          [System.IO.Path]::GetRelativePath($pkgDir, $selectedFile.FullName).Replace([System.IO.Path]::DirectorySeparatorChar, '/') | Set-Content -Path $catalogPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_path=$catalogPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "selected_file_name=$($selectedFile.Name)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "selected_file_path=$($selectedFile.FullName)"

      - name: Azure login for Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts with Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true'
        id: windows_signing
        continue-on-error: ${{ matrix.target.id == 'win-msix' }}
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-catalog: ${{ steps.windows_artifacts.outputs.catalog_path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          cache-dependencies: true

      - name: Summarize unsigned MSIX fallback
        if: always() && steps.signing_policy.outputs.required == 'true' && matrix.target.id == 'win-msix' && steps.windows_signing.outcome != 'success'
        shell: pwsh
        run: |
          $summary = @(
            '## Windows MSIX signing skipped',
            '',
            '- Azure Artifact Signing v2 for MSIX did not complete successfully on this run.',
            '- The signed `win-msix` artifact was skipped.',
            '- The unsigned MSIX artifact is still available via `win-msix-unsigned`.'
          ) -join "`n"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          Write-Warning 'MSIX signing failed; skipping signed artifact upload and retaining only the unsigned MSIX artifact.'

      - name: Verify Windows signatures
        if: success() && steps.signing_policy.outputs.required == 'true' && matrix.target.id != 'win-msix'
        shell: bash
        env:
          VERIFY_STRICT: 'true'
        run: |
          node scripts/verify-signature.js --catalog "${{ steps.windows_artifacts.outputs.catalog_path }}"

      - name: Upload build artifacts
        if: success() && (steps.signing_policy.outputs.required != 'true' || matrix.target.id != 'win-msix' || steps.windows_signing.outcome == 'success')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.id }}
          path: ${{ matrix.target.artifact_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish build artifacts to existing GitHub Release
        if: success() && inputs.publish_release_assets && (steps.signing_policy.outputs.required != 'true' || matrix.target.id != 'win-msix' || steps.windows_signing.outcome == 'success')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(${{ matrix.target.artifact_path }})
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files matched: ${{ matrix.target.artifact_path }}" >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" --clobber "${files[@]}"

      - name: Upload unsigned Windows artifacts
        if: success() && steps.signing_policy.outputs.required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.id }}-unsigned
          path: unsigned-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish unsigned Windows artifacts to existing GitHub Release
        if: success() && inputs.publish_release_assets && steps.signing_policy.outputs.required == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(unsigned-artifacts/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No unsigned Windows release files were found" >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" --clobber "${files[@]}"
